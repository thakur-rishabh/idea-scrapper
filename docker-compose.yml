version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend/database.db:/app/database.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5175:80"
    depends_on:
      - backend
    restart: unless-stopped
